name: Build iOS (AltStore)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Ruby / CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install CocoaPods gem
        run: gem install cocoapods --no-document

      - name: Install JS dependencies
        run: npm install --ignore-scripts

      # Замість patch-package — пряма заміна Python-ом (надійно, незалежно від endings)
      - name: Fix RNGestureHandlerModule.mm
        run: |
          python3 << 'PYEOF'
          import sys

          path = "node_modules/react-native-gesture-handler/apple/RNGestureHandlerModule.mm"
          with open(path, "r") as f:
              content = f.read()

          old = (
              "        auto shadowNode = shadowNodeFromValue(runtime, arguments[0]);\n"
              "\n"
              "        if (dynamic_pointer_cast<const ParagraphShadowNode>(shadowNode)) {\n"
              "          return jsi::Value(true);\n"
              "        }\n"
              "\n"
              "        if (dynamic_pointer_cast<const TextShadowNode>(shadowNode)) {\n"
              "          return jsi::Value(true);\n"
              "        }\n"
              "\n"
              "        bool isViewFlatteningDisabled = shadowNode->getTraits().check(ShadowNodeTraits::FormsStackingContext);\n"
              "\n"
              "        return jsi::Value(isViewFlatteningDisabled);"
          )

          new = (
              "        auto shadowNodeList = shadowNodeListFromValue(runtime, arguments[0]);\n"
              "        if (!shadowNodeList.empty()) {\n"
              "          auto shadowNode = shadowNodeList[0];\n"
              "          bool isViewFlatteningDisabled = shadowNode->getTraits().check(ShadowNodeTraits::FormsStackingContext);\n"
              "          return jsi::Value(isViewFlatteningDisabled);\n"
              "        }\n"
              "        return jsi::Value::null();"
          )

          if old in content:
              content = content.replace(old, new)
              with open(path, "w") as f:
                  f.write(content)
              print("✅ Fix applied successfully")
          elif "shadowNodeListFromValue" in content:
              print("✅ Already fixed (patch was applied earlier)")
          else:
              print("❌ Could not find target block")
              lines = content.splitlines()
              for i, line in enumerate(lines[98:120], 99):
                  print(f"{i}: {line}")
              sys.exit(1)
          PYEOF

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build Unsigned App
        run: |
          cd ios
          set -o pipefail
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(echo "$WORKSPACE" | sed 's/.xcworkspace//')

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log

      - name: Show errors on failure
        if: failure()
        run: grep " error:" ios/build.log | head -20 || tail -50 ios/build.log

      - name: Package into IPA
        run: |
          cd ios
          mkdir -p Payload
          find build -name "*.app" -type d | head -1 | xargs -I{} cp -R {} Payload/
          zip -qr app.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-AltStore
          path: ios/app.ipa

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log
