name: Build iOS (AltStore)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Ruby / CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install CocoaPods gem
        run: gem install cocoapods --no-document

      # Встановлюємо без postinstall — patch-package ще не існує в node_modules
      - name: Install JS dependencies
        run: npm install --ignore-scripts

      # Тепер patch-package вже є в node_modules — застосовуємо патчі
      - name: Apply patches
        run: npx patch-package

      # Перевірка
      - name: Verify patch applied
        run: |
          if grep -q "shadowNodeListFromValue" node_modules/react-native-gesture-handler/apple/RNGestureHandlerModule.mm; then
            echo "✅ Patch applied successfully"
          else
            echo "❌ Patch NOT applied — aborting"
            sed -n '100,120p' node_modules/react-native-gesture-handler/apple/RNGestureHandlerModule.mm
            exit 1
          fi

      # Запускаємо postinstall скрипти вручну (без patch-package, він вже відпрацював)
      - name: Run other postinstall scripts
        run: npx expo install --check || true

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build Unsigned App
        run: |
          cd ios
          set -o pipefail
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(echo "$WORKSPACE" | sed 's/.xcworkspace//')

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log

      - name: Show errors on failure
        if: failure()
        run: grep " error:" ios/build.log | head -20 || tail -50 ios/build.log

      - name: Package into IPA
        run: |
          cd ios
          mkdir -p Payload
          find build -name "*.app" -type d | head -1 | xargs -I{} cp -R {} Payload/
          zip -qr app.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-AltStore
          path: ios/app.ipa

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log
