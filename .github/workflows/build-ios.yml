name: Build iOS (AltStore)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Ruby / CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install CocoaPods gem
        run: gem install cocoapods --no-document

      - name: Install JS dependencies
        run: npm install --ignore-scripts

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean --no-install

      - name: Fix RNGestureHandlerModule (Fabric API)
        run: |
          FILE="node_modules/react-native-gesture-handler/apple/RNGestureHandlerModule.mm"
          if grep -q "shadowNodeListFromValue" "$FILE"; then
            echo "✅ Already fixed"
          else
            python3 << 'PYEOF'
          path = "node_modules/react-native-gesture-handler/apple/RNGestureHandlerModule.mm"
          with open(path, "rb") as f:
              raw = f.read()
          start = raw.find(b"        auto shadowNode = shadowNodeFromValue(runtime, arguments[0]);")
          end_marker = b"        return jsi::Value(isViewFlatteningDisabled);"
          end = raw.find(end_marker, start) + len(end_marker)
          new_block = (
              b"        auto shadowNodeList = shadowNodeListFromValue(runtime, arguments[0]);\n"
              b"        if (!shadowNodeList.empty()) {\n"
              b"          auto shadowNode = shadowNodeList[0];\n"
              b"          bool isViewFlatteningDisabled = shadowNode->getTraits().check(ShadowNodeTraits::FormsStackingContext);\n"
              b"          return jsi::Value(isViewFlatteningDisabled);\n"
              b"        }\n"
              b"        return jsi::Value::null();"
          )
          with open(path, "wb") as f:
              f.write(raw[:start] + new_block + raw[end:])
          print("✅ Fix applied")
          PYEOF
            grep -q "shadowNodeListFromValue" "$FILE" && echo "✅ Verified" || { echo "❌ Fix failed"; exit 1; }
          fi

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build Unsigned App
        run: |
          cd ios
          set -o pipefail
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(echo "$WORKSPACE" | sed 's/.xcworkspace//')
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log

      - name: Show errors on failure
        if: failure()
        run: grep " error:" ios/build.log | head -20 || tail -50 ios/build.log

      - name: Package into IPA
        run: |
          cd ios
          mkdir -p Payload
          find build -name "*.app" -type d | head -1 | xargs -I{} cp -R {} Payload/
          zip -qr app.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-AltStore
          path: ios/app.ipa

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log
