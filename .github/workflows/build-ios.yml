name: Build iOS (AltStore)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Ruby / CocoaPods
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: false

      - name: Install CocoaPods gem
        run: gem install cocoapods --no-document

      - name: Install JS dependencies
        run: npm install --ignore-scripts

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean --no-install

      # Fix тут — ПІСЛЯ prebuild, ПЕРЕД pod install
      # Так навіть якщо prebuild чіпав node_modules — ми фіксимо після нього
      - name: Fix RNGestureHandlerModule.mm (Fabric API compatibility)
        run: |
          FILE="node_modules/react-native-gesture-handler/apple/RNGestureHandlerModule.mm"

          if grep -q "shadowNodeListFromValue" "$FILE"; then
            echo "✅ Already fixed"
            exit 0
          fi

          if ! grep -q "shadowNodeFromValue" "$FILE"; then
            echo "❌ Unexpected file content:"
            sed -n '100,120p' "$FILE"
            exit 1
          fi

          python3 << 'PYEOF'
          path = "node_modules/react-native-gesture-handler/apple/RNGestureHandlerModule.mm"
          with open(path, "rb") as f:
              raw = f.read()

          # Працюємо з bytes щоб не залежати від line endings
          old = (
              b"        auto shadowNode = shadowNodeFromValue(runtime, arguments[0]);"
          )

          # Знаходимо весь блок від old до кінця return
          start = raw.find(old)
          if start == -1:
              print("❌ Could not find target")
              import sys; sys.exit(1)

          # Знаходимо кінець блоку (до return jsi::Value(isViewFlatteningDisabled);)
          end_marker = b"        return jsi::Value(isViewFlatteningDisabled);"
          end = raw.find(end_marker, start)
          if end == -1:
              print("❌ Could not find end marker")
              import sys; sys.exit(1)

          end += len(end_marker)

          new_block = (
              b"        auto shadowNodeList = shadowNodeListFromValue(runtime, arguments[0]);\n"
              b"        if (!shadowNodeList.empty()) {\n"
              b"          auto shadowNode = shadowNodeList[0];\n"
              b"          bool isViewFlatteningDisabled = shadowNode->getTraits().check(ShadowNodeTraits::FormsStackingContext);\n"
              b"          return jsi::Value(isViewFlatteningDisabled);\n"
              b"        }\n"
              b"        return jsi::Value::null();"
          )

          new_raw = raw[:start] + new_block + raw[end:]
          with open(path, "wb") as f:
              f.write(new_raw)
          print("✅ Fix applied successfully")
          PYEOF

          # Фінальна перевірка
          if grep -q "shadowNodeListFromValue" "$FILE"; then
            echo "✅ Verified: fix is in place"
          else
            echo "❌ Fix verification failed"
            exit 1
          fi

      - name: Install Pods
        run: |
          cd ios
          pod install --repo-update
          cd ..

      - name: Build Unsigned App
        run: |
          cd ios
          set -o pipefail
          WORKSPACE=$(ls -d *.xcworkspace | head -n 1)
          SCHEME=$(echo "$WORKSPACE" | sed 's/.xcworkspace//')

          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build 2>&1 | tee build.log

      - name: Show errors on failure
        if: failure()
        run: grep " error:" ios/build.log | head -20 || tail -50 ios/build.log

      - name: Package into IPA
        run: |
          cd ios
          mkdir -p Payload
          find build -name "*.app" -type d | head -1 | xargs -I{} cp -R {} Payload/
          zip -qr app.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-AltStore
          path: ios/app.ipa

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ios/build.log
