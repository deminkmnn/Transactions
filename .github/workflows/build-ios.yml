name: Build iOS (AltStore)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Clean iOS Build Artifacts
        run: |
          cd ios
          rm -rf Pods
          rm -f Podfile.lock
          rm -rf build
          cd ..

      - name: Install CocoaPods
        run: |
          cd ios
          # Очищаємо Podfile.lock і Pods перед установкою
          rm -f Podfile.lock
          rm -rf Pods
          bundle install || echo "No Gemfile found"
          pod repo update
          pod install
          cd ..

      - name: Build Unsigned App
        run: |
          cd ios
          set -o pipefail
          # Збираємо додаток, ігноруючи підпис
          xcodebuild -workspace "*.xcworkspace" \
            -scheme "*" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | xcpretty || true

      - name: Package into IPA
        run: |
          cd ios
          # Знаходимо скомпільований .app файл і створюємо структуру Payload
          mkdir -p Payload
          find build -name "*.app" -exec cp -R {} Payload/ \;
          # Пакуємо в IPA
          zip -qr app.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-AltStore
          path: ios/app.ipa