name: Build iOS (AltStore)

on:
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean

      - name: Install CocoaPods
        run: |
          cd ios
          bundle install
          pod repo update
          pod install

      - name: Build Unsigned App
        run: |
          cd ios
          # Використовуємо xcbeautify для чистого логу (якщо встановлено) 
          # або просто xcodebuild з налаштуваннями
          set -o pipefail
          xcodebuild -workspace *.xcworkspace \
            -scheme "*" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | xcpretty || true

      - name: Package into IPA
        run: |
          cd ios
          mkdir -p Payload
          # Шукаємо .app файл і кладемо в Payload
          find build -name "*.app" -exec cp -R {} Payload/ \;
          zip -qr app.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: iOS-App-AltStore
          path: ios/app.ipa